<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Corporativo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg custom-navbar px-3 shadow-sm">
        <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-chart-line me-2"></i>CorpDash</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <input type="file" id="fileUpload" class="form-control form-control-sm d-none" accept=".xlsx, .xls, .csv">
            <label for="fileUpload" class="btn btn-outline-primary btn-sm mb-0">
                <i class="fa-solid fa-upload me-1"></i> Carregar Excel
            </label>
            <button class="btn btn-outline-secondary btn-sm" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Imprimir
            </button>
            <button class="btn btn-danger btn-sm" onclick="exportToPDF()">
                <i class="fa-solid fa-file-pdf"></i> Exportar PDF
            </button>
            <button class="btn btn-dark btn-sm" id="themeToggle" onclick="toggleTheme()">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container-fluid py-4" id="dashboard-content">
        <div class="card filter-card mb-4">
            <div class="card-body row g-3 align-items-end">
                <div class="col-md-2">
                    <label class="form-label">Data Início</label>
                    <input type="date" id="filterDateStart" class="form-control form-control-sm">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Data Fim</label>
                    <input type="date" id="filterDateEnd" class="form-control form-control-sm">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Setor</label>
                    <select id="filterSetor" class="form-select form-select-sm"><option value="">Todos</option></select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Produto</label>
                    <select id="filterProduto" class="form-select form-select-sm"><option value="">Todos</option></select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Pesquisa</label>
                    <input type="text" id="filterSearch" class="form-control form-control-sm" placeholder="Pesquisar em todas as colunas...">
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4 col-lg-2"><div class="card kpi-card"><div class="card-body"><h6>Qtd Total</h6><h4 id="kpiQtd">0</h4></div></div></div>
            <div class="col-md-4 col-lg-2"><div class="card kpi-card"><div class="card-body"><h6>Valor Total</h6><h4 id="kpiTotal">R$ 0,00</h4></div></div></div>
            <div class="col-md-4 col-lg-2"><div class="card kpi-card"><div class="card-body"><h6>Média (Ticket)</h6><h4 id="kpiMedia">R$ 0,00</h4></div></div></div>
            <div class="col-md-4 col-lg-2"><div class="card kpi-card"><div class="card-body"><h6>Maior Venda</h6><h4 id="kpiMax">R$ 0,00</h4></div></div></div>
            <div class="col-md-4 col-lg-2"><div class="card kpi-card"><div class="card-body"><h6>Menor Venda</h6><h4 id="kpiMin">R$ 0,00</h4></div></div></div>
            <div class="col-md-4 col-lg-2"><div class="card kpi-card"><div class="card-body"><h6>Registros</h6><h4 id="kpiCount">0</h4></div></div></div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-8">
                <div class="card chart-card"><div class="card-body">
                    <h6 class="card-title">Evolução de Vendas (Linha e Área)</h6>
                    <div class="chart-container"><canvas id="chartLineArea"></canvas></div>
                </div></div>
            </div>
            <div class="col-lg-4">
                <div class="card chart-card"><div class="card-body">
                    <h6 class="card-title">Distribuição por Setor (Pizza)</h6>
                    <div class="chart-container"><canvas id="chartPie"></canvas></div>
                </div></div>
            </div>
            <div class="col-lg-6">
                <div class="card chart-card"><div class="card-body">
                    <h6 class="card-title">Top Produtos Vendidos (Barras)</h6>
                    <div class="chart-container"><canvas id="chartBar"></canvas></div>
                </div></div>
            </div>
            <div class="col-lg-6">
                <div class="card chart-card"><div class="card-body">
                    <h6 class="card-title">Receita por Setor (Doughnut)</h6>
                    <div class="chart-container"><canvas id="chartDoughnut"></canvas></div>
                </div></div>
            </div>
        </div>

        <div class="card table-card">
            <div class="card-body">
                <h6 class="card-title mb-3">Detalhamento de Registros</h6>
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle">
                        <thead id="tableHead">
                            </thead>
                        <tbody id="tableBody">
                            </tbody>
                    </table>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span id="pageInfo" class="text-muted small"></span>
                    <div class="btn-group">
                        <button class="btn btn-sm btn-outline-secondary" onclick="prevPage()">Anterior</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="nextPage()">Próxima</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
